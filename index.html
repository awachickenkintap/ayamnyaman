<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWA CHICKEN KINTAP</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  background: #fafafa;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background-color: #ff4d4d;
  color: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.cart {
  font-size: 1.5em;
  cursor: pointer;
}

/* MENU */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: #fff;
  border-bottom: 2px solid #eee;
}

.menu-item {
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
  border-bottom: 3px solid transparent;
  transition: 0.2s;
}

.menu-item:hover {
  background: #ffe6e6;
}

.menu-item.active {
  border-bottom: 3px solid #ff4d4d;
  color: #ff4d4d;
}

/* PRODUK */
.produk-page {
  padding: 15px;
}

.produk-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.produk-card {
  border: 2px solid #ff4d4d;
  border-radius: 10px;
  padding: 10px;
  background: white;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.produk-card:hover {
  transform: scale(1.02);
}

.produk-card img {
  width: 100%;
  border-radius: 8px;
}

.produk-card p {
  margin: 8px 0;
  font-weight: bold;
}

.qty-control {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.qty-control button {
  padding: 5px 10px;
  border: none;
  background: #ff4d4d;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.add-cart {
  margin-top: 8px;
  padding: 8px;
  width: 100%;
  background-color: #ff4d4d;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
</style>

</head>
<body>

<header>
  <h1>AWA CHICKEN KINTAP</h1>
  <div class="cart" onclick="goToCart()">🛒</div>
</header>

<!-- MENU -->
<div class="menu-grid">
  <div class="menu-item active" onclick="showMenu(this)">Produk</div>
  <div class="menu-item" onclick="showMenu(this)">Paket Siap Makan</div>
  <div class="menu-item" onclick="showMenu(this)">Paket Hemat</div>
  <div class="menu-item" onclick="showMenu(this)">Paket Keluarga</div>
  <div class="menu-item" onclick="showMenu(this)">Paket Acara</div>
</div>

<!-- PRODUK -->
<div class="produk-page">

  <div class="produk-grid">

    <div class="produk-card">
      <img src="sayap.jpeg" alt="Sayap">
      <p>Sayap - Rp7.000</p>
      <div class="qty-control">
        <button onclick="decreaseQty(this)">-</button>
        <span>1</span>
        <button onclick="increaseQty(this)">+</button>
      </div>
      <button class="add-cart">Tambah Keranjang</button>
    </div>

    <div class="produk-card">
      <img src="dada.jpeg" alt="Dada">
      <p>Dada - Rp9.000</p>
      <div class="qty-control">
        <button onclick="decreaseQty(this)">-</button>
        <span>1</span>
        <button onclick="increaseQty(this)">+</button>
      </div>
      <button class="add-cart">Tambah Keranjang</button>
    </div>

    <div class="produk-card">
      <img src="paha.jpeg" alt="Paha">
      <p>Paha - Rp8.000</p>
      <div class="qty-control">
        <button onclick="decreaseQty(this)">-</button>
        <span>1</span>
        <button onclick="increaseQty(this)">+</button>
      </div>
      <button class="add-cart">Tambah Keranjang</button>
    </div>

    <div class="produk-card">
      <img src="kulit.jpeg" alt="Kulit">
      <p>Kulit - Rp5.000</p>
      <div class="qty-control">
        <button onclick="decreaseQty(this)">-</button>
        <span>1</span>
        <button onclick="increaseQty(this)">+</button>
      </div>
      <button class="add-cart">Tambah Keranjang</button>
    </div>

  </div>

</div>

<script>

// MENU ACTIVE
function showMenu(element) {
  document.querySelectorAll('.menu-item').forEach(item => {
    item.classList.remove('active');
  });
  element.classList.add('active');
}

// QTY
function increaseQty(button) {
  const span = button.parentElement.querySelector('span');
  span.textContent = parseInt(span.textContent) + 1;
}

function decreaseQty(button) {
  const span = button.parentElement.querySelector('span');
  if (parseInt(span.textContent) > 1) {
    span.textContent = parseInt(span.textContent) - 1;
  }
}

// LOCAL STORAGE CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.querySelectorAll('.add-cart').forEach((button) => {
  button.addEventListener('click', function () {
    const card = button.closest('.produk-card');
    const qty = parseInt(card.querySelector('span').textContent);
    const name = card.querySelector('img').alt;

    cart.push({ name, qty });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " ditambahkan ke keranjang (" + qty + ")");
  });
});

// GO TO CART
function goToCart() {
  window.location.href = "keranjang.html";
}

</script>

</body>
</html>
