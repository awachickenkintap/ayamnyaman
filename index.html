<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AWA CHICKEN KINTAP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f5f6f8;
  user-select: none;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 100;
  background: #ff4d4d;
  color: white;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-weight: 700;
  font-size: 14px;
}

.cart {
  position: relative;
  font-size: 22px;
  cursor: pointer;
}

.cart-badge {
  position: absolute;
  top: -5px;
  right: -8px;
  background: black;
  color: white;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 50%;
}

/* MENU */
.menu-grid {
  position: fixed;
  top: 50px;
  width: 100%;
  display: flex;
  overflow-x: auto;
  background: white;
  border-bottom: 1px solid #eee;
}

.menu-item {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}

.menu-item.active {
  color: #ff4d4d;
  border-bottom: 2px solid #ff4d4d;
}

/* CONTENT */
.content {
  margin-top: 100px;
  padding: 12px;
}

/* GRID */
.produk-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* CARD */
.produk-card {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
}

.produk-card img {
  width: 100%;
  border-radius: 10px;
}

/* TEXT */
.produk-title {
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
}

.produk-price {
  font-size: 13px;
  font-weight: 700;
  color: #ff4d4d;
  margin-bottom: 6px;
}

/* QTY */
.qty-control {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.qty-btn {
  width: 32px;
  height: 32px;
  border: none;
  background: #f1f1f1;
  border-radius: 8px;
  font-size: 16px;
}

.qty-value {
  font-size: 14px;
  font-weight: 600;
}

/* BUTTON */
.add-cart {
  margin-top: 8px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  color: white;
  background: #ff4d4d;
}

/* SAFE AREA (biar tidak ketutup bawah HP) */
.safe-bottom {
  height: 30px;
}
</style>
</head>

<body oncontextmenu="return false">

<header>
  <div class="brand">AWA CHICKEN KINTAP</div>
  <div class="cart" onclick="goToCart()">
    🛒
    <div class="cart-badge" id="cartCount">0</div>
  </div>
</header>

<div class="menu-grid">
  <div class="menu-item active" onclick="setActive(this)">Produk</div>
  <div class="menu-item" onclick="setActive(this)">Siap</div>
  <div class="menu-item" onclick="setActive(this)">Hemat</div>
  <div class="menu-item" onclick="setActive(this)">Keluarga</div>
  <div class="menu-item" onclick="setActive(this)">Acara</div>
</div>

<div class="content">
  <div class="produk-grid">

    <div class="produk-card">
      <img src="sayap.jpeg">
      <div class="produk-title">Sayap</div>
      <div class="produk-price">Rp7.000</div>

      <div class="qty-control">
        <button class="qty-btn" onclick="decreaseQty(this)">-</button>
        <div class="qty-value">1</div>
        <button class="qty-btn" onclick="increaseQty(this)">+</button>
      </div>

      <button class="add-cart">Tambah</button>
    </div>

    <div class="produk-card">
      <img src="dada.jpeg">
      <div class="produk-title">Dada</div>
      <div class="produk-price">Rp9.000</div>

      <div class="qty-control">
        <button class="qty-btn" onclick="decreaseQty(this)">-</button>
        <div class="qty-value">1</div>
        <button class="qty-btn" onclick="increaseQty(this)">+</button>
      </div>

      <button class="add-cart">Tambah</button>
    </div>

    <div class="produk-card">
      <img src="paha.jpeg">
      <div class="produk-title">Paha</div>
      <div class="produk-price">Rp8.000</div>

      <div class="qty-control">
        <button class="qty-btn" onclick="decreaseQty(this)">-</button>
        <div class="qty-value">1</div>
        <button class="qty-btn" onclick="increaseQty(this)">+</button>
      </div>

      <button class="add-cart">Tambah</button>
    </div>

    <div class="produk-card">
      <img src="kulit.jpeg">
      <div class="produk-title">Kulit</div>
      <div class="produk-price">Rp5.000</div>

      <div class="qty-control">
        <button class="qty-btn" onclick="decreaseQty(this)">-</button>
        <div class="qty-value">1</div>
        <button class="qty-btn" onclick="increaseQty(this)">+</button>
      </div>

      <button class="add-cart">Tambah</button>
    </div>

  </div>
</div>

<div class="safe-bottom"></div>

<script>

// disable copy
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u')) {
    e.preventDefault();
  }
});

// menu
function setActive(el){
  document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

// qty
function increaseQty(btn){
  let val = btn.parentElement.querySelector('.qty-value');
  val.textContent = parseInt(val.textContent)+1;
}

function decreaseQty(btn){
  let val = btn.parentElement.querySelector('.qty-value');
  if(val.textContent > 1){
    val.textContent = parseInt(val.textContent)-1;
  }
}

// cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.querySelectorAll('.add-cart').forEach(btn=>{
  btn.addEventListener('click', function(){
    let card = btn.closest('.produk-card');
    let name = card.querySelector('.produk-title').textContent;
    let qty = parseInt(card.querySelector('.qty-value').textContent);

    cart.push({name, qty});
    localStorage.setItem("cart", JSON.stringify(cart));

    updateCart();
  });
});

function updateCart(){
  document.getElementById('cartCount').textContent = cart.length;
}

updateCart();

function goToCart(){
  window.location.href = "keranjang.html";
}

</script>

</body>
</html>
